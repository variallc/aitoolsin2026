<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI in Your Pocket</title>  <link href="https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;700&display=swap" rel="stylesheet">  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Product Sans', Arial, sans-serif; }

    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border-radius: 22px;
      padding: 40px 25px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: fadeUp 1s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 { font-size: 30px; margin-bottom: 15px; }
    .subtitle { color: #d1d1d1; margin-bottom: 25px; }

    .benefits div {
      margin-bottom: 10px;
      opacity: 0;
      transform: translateX(-20px);
      animation: slideIn 0.5s forwards;
    }

    .benefits div:nth-child(1){animation-delay:0.3s}
    .benefits div:nth-child(2){animation-delay:0.5s}
    .benefits div:nth-child(3){animation-delay:0.7s}
    .benefits div:nth-child(4){animation-delay:0.9s}

    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #7b5cff, #5a3fff);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .download-box {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(0,255,150,0.1);
      border: 1px solid rgba(0,255,150,0.3);
      text-align: center;
      animation: fadeUp 0.6s ease;
    }

    .download-box a {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 18px;
      background: #00c853;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

  </style></head><body><div class="card">  <h1>Stop Wasting Hours on School Work — Use AI Instead</h1>  <p class="subtitle">
    Discover 7 powerful AI tools that help you work faster and smarter.
  </p>  <div class="benefits">
    <div>✔ Finish assignments faster</div>
    <div>✔ Understand topics easily</div>
    <div>✔ Create slides instantly</div>
    <div>✔ Save 5+ hours weekly</div>
  </div>  <form id="leadForm">
    <input type="text" name="name" placeholder="Your name (optional)">
    <input type="email" name="email" placeholder="Enter your email" required>
    <button type="submit">Get Free Guide</button>
  </form>  <div class="download-box" id="downloadBox">
    <p>✅ Success! Click below to access your free guide:</p>
    <a href="https://selar.com/013v55534o" target="_blank">Download Now</a>
  </div></div><script>
  const form = document.getElementById('leadForm');
  const box = document.getElementById('downloadBox');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const data = new FormData(form);

    await fetch("https://formspree.io/f/yourformid", {
      method: "POST",
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    form.style.display = "none";
    box.style.display = "block";
  });
</script></body>
  </html>
